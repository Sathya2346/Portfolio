<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#141419" />
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#863bff" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glowing Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#primaryGrad)" stroke-width="12" opacity="0.85" filter="url(#glow)" />

  <!-- Monogram Text "SG" -->
  <text x="50%" y="54%" dominant-baseline="central" text-anchor="middle" font-family="'Outfit', 'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="240" font-weight="900" fill="url(#primaryGrad)" filter="url(#glow)" letter-spacing="-8">SG</text>
</svg>